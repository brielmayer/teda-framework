name: Java CI with Maven

# Runs the full test suite on every push to main and every pull request.
# The Testcontainers-based database tests need Docker; ubuntu-latest runners
# have Docker pre-installed, so no extra setup is required.

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Make the Maven Wrapper executable
        run: chmod +x ./mvnw

      - name: Build and run tests
        run: ./mvnw -B -ntp verify
